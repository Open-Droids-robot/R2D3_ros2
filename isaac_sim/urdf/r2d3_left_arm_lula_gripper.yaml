# Lula robot description for R2D3's LEFT arm (7-DOF RM75-B) — PARALLEL GRIPPER
# variant. cspace = the 7 left-arm joints; everything else pinned. Used with
# isaac_sim/urdf/r2d3_v1_gripper.urdf (4 prismatic finger joints, no dex hand).
api_version: 1.0

cspace:
    - l_joint1
    - l_joint2
    - l_joint3
    - l_joint4
    - l_joint5
    - l_joint6
    - l_joint7

default_q: [0.0, -0.5, 0.0, -1.5, 0.0, 1.0, 0.0]

acceleration_limits: [15.0, 15.0, 15.0, 15.0, 15.0, 10.0, 10.0]
jerk_limits: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0]

cspace_to_urdf_rules:
    - {name: platform_joint, rule: fixed, value: 0.5}
    - {name: r_joint1, rule: fixed, value: 0.0}
    - {name: r_joint2, rule: fixed, value: 0.0}
    - {name: r_joint3, rule: fixed, value: 0.0}
    - {name: r_joint4, rule: fixed, value: 0.0}
    - {name: r_joint5, rule: fixed, value: 0.0}
    - {name: r_joint6, rule: fixed, value: 0.0}
    - {name: r_joint7, rule: fixed, value: 0.0}
    - {name: head_joint1, rule: fixed, value: 0.0}
    - {name: head_joint2, rule: fixed, value: 0.0}
    - {name: l_finger_drive, rule: fixed, value: 0.035}
    - {name: l_finger_mimic, rule: fixed, value: 0.035}
    - {name: r_finger_drive, rule: fixed, value: 0.035}
    - {name: r_finger_mimic, rule: fixed, value: 0.035}

collision_spheres: []
