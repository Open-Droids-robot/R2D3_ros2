# Lula robot description for R2D3's LEFT arm (7-DOF RM75-B).
# cspace = the 7 left-arm joints; everything else is pinned. The body lift
# (platform_joint) is pinned at 0.5 m — keep the sim lift there during IK reach,
# then raise it after grasping. Used with isaac_sim/urdf/r2d3_v1.urdf.
api_version: 1.0

cspace:
    - l_joint1
    - l_joint2
    - l_joint3
    - l_joint4
    - l_joint5
    - l_joint6
    - l_joint7

default_q: [0.0, -0.5, 0.0, -1.5, 0.0, 1.0, 0.0]

acceleration_limits: [15.0, 15.0, 15.0, 15.0, 15.0, 10.0, 10.0]
jerk_limits: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0]

# Pin every non-cspace actuated joint (wheels are welded/fixed in the URDF).
cspace_to_urdf_rules:
    - {name: platform_joint, rule: fixed, value: 0.5}
    - {name: r_joint1, rule: fixed, value: 0.0}
    - {name: r_joint2, rule: fixed, value: 0.0}
    - {name: r_joint3, rule: fixed, value: 0.0}
    - {name: r_joint4, rule: fixed, value: 0.0}
    - {name: r_joint5, rule: fixed, value: 0.0}
    - {name: r_joint6, rule: fixed, value: 0.0}
    - {name: r_joint7, rule: fixed, value: 0.0}
    - {name: head_joint1, rule: fixed, value: 0.0}
    - {name: head_joint2, rule: fixed, value: 0.0}
    - {name: l_dex_thumb_proximal_yaw_joint, rule: fixed, value: 0.0}
    - {name: l_dex_thumb_proximal_pitch_joint, rule: fixed, value: 0.0}
    - {name: l_dex_thumb_intermediate_joint, rule: fixed, value: 0.0}
    - {name: l_dex_thumb_distal_joint, rule: fixed, value: 0.0}
    - {name: l_dex_index_proximal_joint, rule: fixed, value: 0.0}
    - {name: l_dex_index_intermediate_joint, rule: fixed, value: 0.0}
    - {name: l_dex_middle_proximal_joint, rule: fixed, value: 0.0}
    - {name: l_dex_middle_intermediate_joint, rule: fixed, value: 0.0}
    - {name: l_dex_ring_proximal_joint, rule: fixed, value: 0.0}
    - {name: l_dex_ring_intermediate_joint, rule: fixed, value: 0.0}
    - {name: l_dex_pinky_proximal_joint, rule: fixed, value: 0.0}
    - {name: l_dex_pinky_intermediate_joint, rule: fixed, value: 0.0}
    - {name: r_dex_thumb_proximal_yaw_joint, rule: fixed, value: 0.0}
    - {name: r_dex_thumb_proximal_pitch_joint, rule: fixed, value: 0.0}
    - {name: r_dex_thumb_intermediate_joint, rule: fixed, value: 0.0}
    - {name: r_dex_thumb_distal_joint, rule: fixed, value: 0.0}
    - {name: r_dex_index_proximal_joint, rule: fixed, value: 0.0}
    - {name: r_dex_index_intermediate_joint, rule: fixed, value: 0.0}
    - {name: r_dex_middle_proximal_joint, rule: fixed, value: 0.0}
    - {name: r_dex_middle_intermediate_joint, rule: fixed, value: 0.0}
    - {name: r_dex_ring_proximal_joint, rule: fixed, value: 0.0}
    - {name: r_dex_ring_intermediate_joint, rule: fixed, value: 0.0}
    - {name: r_dex_pinky_proximal_joint, rule: fixed, value: 0.0}
    - {name: r_dex_pinky_intermediate_joint, rule: fixed, value: 0.0}

collision_spheres: []
