# ros2_control controllers for R2D3 65b navigation simulation
# Drive wheels use diff_drive_controller (velocity command)
# Arms use joint_trajectory_controller (position command)

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    platform_controller:
      type: position_controllers/GripperActionController

# ─────────────────────────────────────────────────────────────
#  Diff Drive Controller (mobile base)
# ─────────────────────────────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["joint_left_wheel"]
    right_wheel_names: ["joint_right_wheel"]

    # Geometry from URDF analysis
    wheel_separation: 0.296          # distance between wheel centers (m)
    wheel_radius: 0.08               # wheel radius (m)

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    use_stamped_vel: false       # Nav2 publishes geometry_msgs/Twist (unstamped)

    # Velocity and acceleration limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 0.5
    linear.x.min_velocity: -0.3
    linear.x.max_acceleration: 0.8
    linear.x.max_jerk: .NAN
    linear.x.min_jerk: .NAN

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 1.5
    angular.z.min_velocity: -1.5
    angular.z.max_acceleration: 2.0
    angular.z.min_acceleration: -2.0
    angular.z.max_jerk: .NAN
    angular.z.min_jerk: .NAN

# ─────────────────────────────────────────────────────────────
#  Arm Controllers (6-DOF)
# ─────────────────────────────────────────────────────────────
left_arm_controller:
  ros__parameters:
    joints:
      - l_joint1
      - l_joint2
      - l_joint3
      - l_joint4
      - l_joint5
      - l_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

right_arm_controller:
  ros__parameters:
    joints:
      - r_joint1
      - r_joint2
      - r_joint3
      - r_joint4
      - r_joint5
      - r_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

# ─────────────────────────────────────────────────────────────
#  Platform Lift Controller
# ─────────────────────────────────────────────────────────────
platform_controller:
  ros__parameters:
    joint: platform_joint
