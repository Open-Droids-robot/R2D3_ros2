# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      action_ns: follow_joint_trajectory  # 添加这一行

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      action_ns: follow_joint_trajectory  # 添加这一行

    left_hand_controller:  
      type: joint_trajectory_controller/JointTrajectoryController
      action_ns: follow_joint_trajectory

    right_hand_controller: 
      type: joint_trajectory_controller/JointTrajectoryController
      action_ns: follow_joint_trajectory
      
    platform_controller:
      type: position_controllers/GripperActionController
      action_ns: follow_joint_trajectory  # 添加这一行

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_controller:
  ros__parameters:
    joints:
      - l_joint1
      - l_joint2
      - l_joint3
      - l_joint4
      - l_joint5
      - l_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_arm_controller:
  ros__parameters:
    joints:
      - r_joint1
      - r_joint2
      - r_joint3
      - r_joint4
      - r_joint5
      - r_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
left_hand_controller:
  ros__parameters:
    joints:
      - left_thumb_proximal_yaw_joint
      - left_thumb_proximal_pitch_joint
      - left_thumb_intermediate_joint
      - left_thumb_distal_joint
      - left_index_proximal_joint
      - left_index_intermediate_joint
      - left_middle_proximal_joint
      - left_middle_intermediate_joint
      - left_ring_proximal_joint
      - left_ring_intermediate_joint
      - left_pinky_proximal_joint
      - left_pinky_intermediate_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_hand_controller:
  ros__parameters:
    joints:
      - right_thumb_proximal_yaw_joint
      - right_thumb_proximal_pitch_joint
      - right_thumb_intermediate_joint
      - right_thumb_distal_joint
      - right_index_proximal_joint
      - right_index_intermediate_joint
      - right_middle_proximal_joint
      - right_middle_intermediate_joint
      - right_ring_proximal_joint
      - right_ring_intermediate_joint
      - right_pinky_proximal_joint
      - right_pinky_intermediate_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
platform_controller:
  ros__parameters:
    joint: platform_joint