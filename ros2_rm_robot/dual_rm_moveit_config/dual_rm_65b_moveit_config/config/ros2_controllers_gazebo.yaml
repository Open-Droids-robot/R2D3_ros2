# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 30  # Hz
    use_sim_time: true

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    platform_controller:
      type: position_controllers/GripperActionController

    diff_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - l_joint1
      - l_joint2
      - l_joint3
      - l_joint4
      - l_joint5
      - l_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_arm_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - r_joint1
      - r_joint2
      - r_joint3
      - r_joint4
      - r_joint5
      - r_joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
platform_controller:
  ros__parameters:
    use_sim_time: true
    joint: platform_joint

diff_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ['joint_left_wheel']
    right_wheel_names: ['joint_right_wheel']
    wheels_per_side: 1
    wheel_separation: 0.296
    wheel_radius: 0.084
    base_frame_id: base_footprint
    use_stamped_vel: false

    publish_rate: 30.0

    linear.x.has_velocity_limits: false
    linear.x.has_acceleration_limits: false
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 0.0
    linear.x.min_velocity: 0.0
    linear.x.max_acceleration: 0.0
    linear.x.min_acceleration: 0.0
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: false
    angular.z.has_acceleration_limits: false
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 0.0
    angular.z.min_velocity: 0.0
    angular.z.max_acceleration: 0.0
    angular.z.min_acceleration: 0.0
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0