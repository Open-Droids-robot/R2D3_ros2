# Docker/isaac/compose.isaac.yaml
#
# Standalone compose file for the R2D3 Isaac Sim 5.1 service. Pinned to GPU 1 by default
# (GPU 0 commonly has other users' processes on Riddle).
#
# Run alongside the upstream Gazebo/ROS2 compose by stacking both files:
#
#   docker compose \
#     -f Docker/docker-compose.yml \
#     -f Docker/isaac/compose.isaac.yaml \
#     up r2d3-humble isaac-sim
#
# Or just the Isaac service:
#
#   docker compose -f Docker/isaac/compose.isaac.yaml up isaac-sim
#
# DO NOT BUILD until admin confirms /usr0 cleanup is done — the Isaac image is large
# and /usr0 (where Docker stores images) is chronically near-full on Riddle.

x-isaac-sim-base: &isaac-sim-base
  image: r2d3-isaac-sim:dev
  build:
    context: ../..
    dockerfile: Docker/isaac/Dockerfile.isaac-sim
    args:
      ISAAC_SIM_VERSION: "5.1.0"
  runtime: nvidia
  # privileged is needed for some Omniverse Kit features (GL/Vulkan device access).
  privileged: true
  network_mode: host
  ipc: host
  stdin_open: true
  tty: true
  shm_size: "8gb"
  environment:
    # GUI: default to TurboVNC display :1; override with the user's $DISPLAY if exported.
    - DISPLAY=${DISPLAY:-:1}
    - XAUTHORITY=/root/.Xauthority
    # Required for non-interactive Isaac Sim launches.
    - ACCEPT_EULA=Y
    - PRIVACY_CONSENT=Y
    - OMNI_KIT_ACCEPT_EULA=YES
    # GPU pin (NVIDIA_VISIBLE_DEVICES + device_ids together pin reliably).
    - NVIDIA_VISIBLE_DEVICES=1
    - NVIDIA_DRIVER_CAPABILITIES=all
    # ROS2 DDS domain — must match the r2d3-humble container's ROS_DOMAIN_ID.
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["1"]
            capabilities: [gpu, graphics, compute, video, display, utility]
  volumes:
    # Project source — bind mount so host edits reflect immediately.
    - ../../:/workspace/r2d3_isaac
    # X11 (works with TurboVNC; vglrun on the host side handles GL acceleration).
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - ${HOME}/.Xauthority:/root/.Xauthority:ro
    # Persistent caches — keep these named so they survive container restarts and
    # we don't redownload Kit assets / Omniverse cache every boot.
    - isaac-kit-cache:/isaac-sim/kit/cache
    - isaac-ov-cache:/root/.cache/ov
    - isaac-nvidia-omniverse:/root/.nvidia-omniverse
    - isaac-cache-pip:/root/.cache/pip

services:
  isaac-sim:
    <<: *isaac-sim-base
    container_name: r2d3-isaac-sim
    hostname: r2d3-isaac-sim
    working_dir: /workspace/r2d3_isaac
    # Default to bash so we can poke around. Switch to one of these for production:
    #   command: /isaac-sim/runheadless.native.sh -v   # WebRTC streaming, no X
    #   command: /isaac-sim/isaac-sim.sh               # GUI, needs DISPLAY + TurboVNC
    command: /bin/bash

volumes:
  isaac-kit-cache:
  isaac-ov-cache:
  isaac-nvidia-omniverse:
  isaac-cache-pip:
